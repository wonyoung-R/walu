<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>찌릿 — 24가지 한판 미니게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#160d2e; --bg2:#1f1240; --panel:#2a1a52; --panel2:#34206b;
    --ink:#f3ecff; --dim:#9d8fc7; --line:rgba(255,255,255,.10);
    --pink:#ff2e7e; --cyan:#21e6c1; --yellow:#ffd23f; --green:#3dff8b;
    --red:#ff4d5e; --blue:#4d7bff;
    --disp:'Press Start 2P', monospace;
    --body:'VT323', monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--bg); color:var(--ink); font-family:var(--body);
    overflow:hidden; user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
    background-image:
      radial-gradient(1200px 600px at 50% -10%, #2a1655 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 110%, #3a1a4f 0%, transparent 55%);
  }
  /* CRT signature overlay */
  #crt{ position:fixed; inset:0; pointer-events:none; z-index:90; }
  #crt::before{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px); }
  #crt::after{ content:""; position:absolute; inset:0;
    background:radial-gradient(120% 120% at 50% 50%, transparent 62%, rgba(0,0,0,.55) 100%); }

  .screen{ position:fixed; inset:0; display:none; flex-direction:column; z-index:1; }
  .screen.active{ display:flex; }

  /* ---------- MENU ---------- */
  #menu{ overflow-y:auto; padding:24px 16px 40px; align-items:center; }
  .marquee{ text-align:center; margin:14px 0 6px; }
  .marquee h1{ font-family:'Press Start 2P','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; font-size:clamp(22px,6.5vw,38px); line-height:1.4;
    margin:0; letter-spacing:1px;
    color:#fff; text-shadow:3px 3px 0 var(--pink), 6px 6px 0 rgba(33,230,193,.45);
    animation:flick 6s infinite steps(1); }
  .marquee h1 .c{ color:var(--cyan); }
  @keyframes flick{ 0%,97%,100%{opacity:1} 97.5%{opacity:.55} 98%{opacity:1} 98.5%{opacity:.4} }
  .tag{ font-size:clamp(15px,4.5vw,20px); color:var(--dim); margin:8px 0 2px; letter-spacing:1px; }
  .insert{ font-family:'Press Start 2P','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    font-size:clamp(13px,3.85vw,18px); color:var(--yellow); margin-top:14px; letter-spacing:1px;
    text-shadow:0 0 10px rgba(255,210,63,.5);
    animation:blink 1.1s steps(1) infinite; }
  @keyframes blink{ 50%{opacity:0} }

  .grid{ width:100%; max-width:760px; margin-top:22px;
    display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  @media(min-width:640px){ .grid{ grid-template-columns:repeat(4,1fr); gap:14px; } }

  .cart{ position:relative; background:var(--panel); border:2px solid var(--line);
    box-shadow:0 5px 0 #0c0720, inset 0 0 0 2px rgba(255,255,255,.03);
    padding:16px 12px 14px; cursor:pointer; text-align:center;
    transition:transform .07s, box-shadow .07s; outline:none; }
  .cart:hover{ transform:translateY(-2px); }
  .cart:active{ transform:translateY(3px); box-shadow:0 2px 0 #0c0720; }
  .cart:focus-visible{ border-color:var(--cyan); }
  .cart .ic{ font-size:34px; line-height:1; filter:drop-shadow(0 2px 0 rgba(0,0,0,.4)); }
  .cart .nm{ font-family:var(--disp); font-size:9px; margin:12px 0 6px; line-height:1.5; min-height:30px;
    display:flex; align-items:center; justify-content:center; }
  .cart .bs{ font-size:16px; color:var(--dim); letter-spacing:.5px; }
  .cart .bs b{ color:var(--yellow); font-weight:400; }
  .cart .no{ font-family:var(--disp); font-size:8px; padding:2px 7px; display:inline-block; margin-top:3px; }
  .cart::after{ content:""; position:absolute; top:0; left:0; right:0; height:4px; background:var(--ac,var(--pink)); opacity:.85; }

  /* sponsor / ad card — same footprint as a game card */
  .cart.promo{ display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-decoration:none; color:var(--ink); background:var(--bg2);
    box-shadow:0 5px 0 #0c0720, inset 0 0 0 2px rgba(255,255,255,.04); }
  .cart.promo .nm{ color:#fff; }
  .cart.promo .ds{ color:var(--dim); }
  .cart.promo .admark{ position:absolute; top:5px; right:6px; font-family:var(--disp); font-size:7px;
    color:#120a26; background:var(--ac,var(--pink)); padding:2px 5px; letter-spacing:1px; }
  .cart.promo:hover{ transform:translateY(-2px); }
  .cart.promo:active{ transform:translateY(3px); box-shadow:0 2px 0 #0c0720; }

  .foot{ margin-top:26px; color:var(--dim); font-size:15px; text-align:center; line-height:1.6; }
  .foot a{ color:var(--cyan); }

  /* ---------- GAME ---------- */
  #game{ background:var(--bg); }
  .topbar{ display:flex; align-items:center; gap:10px; padding:12px 14px;
    border-bottom:2px solid var(--line); background:var(--bg2); }
  .iconbtn{ font-family:var(--disp); font-size:10px; color:var(--ink); background:var(--panel);
    border:2px solid var(--line); padding:9px 11px; cursor:pointer; box-shadow:0 3px 0 #0c0720; }
  .iconbtn:active{ transform:translateY(3px); box-shadow:none; }
  .topbar .gname{ font-family:var(--disp); font-size:11px; flex:1; text-align:center; line-height:1.4;
    color:var(--ac,var(--pink)); }
  .topbar .gbest{ font-size:16px; color:var(--dim); white-space:nowrap; }
  .topbar .gbest b{ color:var(--yellow); font-weight:400; }

  .play{ flex:1; position:relative; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:16px; overflow:hidden; }
  .col{ width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; }
  .shake{ animation:shk .35s; }
  @keyframes shk{ 0%,100%{transform:translate(0,0)} 20%{transform:translate(-8px,4px)}
    40%{transform:translate(8px,-3px)} 60%{transform:translate(-6px,-4px)} 80%{transform:translate(5px,3px)} }

  .hint{ font-size:19px; color:var(--dim); text-align:center; line-height:1.4; margin-bottom:18px; }
  .big{ font-family:var(--disp); font-size:clamp(16px,6vw,26px); text-align:center; line-height:1.6; }
  .huge{ font-size:clamp(46px,17vw,90px); line-height:1; letter-spacing:1px; }
  .meta{ display:flex; gap:22px; justify-content:center; margin-bottom:14px; }
  .meta div{ text-align:center; }
  .meta .k{ font-family:var(--disp); font-size:8px; color:var(--dim); }
  .meta .v{ font-size:30px; letter-spacing:1px; }

  /* generic buttons */
  .btn{ font-family:var(--disp); font-size:12px; color:#120a26; background:var(--cyan);
    border:none; padding:16px 18px; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.45);
    width:100%; line-height:1.5; transition:transform .05s, box-shadow .05s; }
  .btn:active{ transform:translateY(5px); box-shadow:0 1px 0 rgba(0,0,0,.45); }
  .btn.big-tap{ font-size:16px; padding:30px 18px; }

  .pad-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:380px; margin-top:6px; }
  .pad{ font-family:var(--disp); font-size:13px; color:#120a26; border:none; padding:26px 8px;
    cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.45); transition:transform .05s, box-shadow .05s, filter .12s; }
  .pad:active{ transform:translateY(5px); box-shadow:0 1px 0 rgba(0,0,0,.45); }
  .pad.lit{ filter:brightness(1.9) saturate(1.3); }

  .stage{ width:100%; max-width:460px; height:min(48vh,360px); display:flex; flex-direction:column;
    align-items:center; justify-content:center; cursor:pointer; border:3px solid var(--line);
    background:var(--panel); text-align:center; padding:16px; }
  .stage.wait{ background:#7a1f33; border-color:#ff4d5e; }
  .stage.go{ background:#16602f; border-color:var(--green); }

  .bar{ width:100%; max-width:380px; height:14px; background:#0c0720; border:2px solid var(--line); margin-top:14px; }
  .bar > i{ display:block; height:100%; background:var(--cyan); width:100%; }

  /* result overlay */
  .ov{ position:absolute; inset:0; background:rgba(8,4,20,.86); display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:20px; z-index:20; text-align:center; }
  .ov .res{ font-family:var(--disp); font-size:clamp(20px,7vw,34px); margin:4px 0 2px; color:var(--ink); }
  .ov .sub{ font-size:20px; color:var(--dim); margin-bottom:10px; }
  .ov .nb{ font-family:var(--disp); font-size:11px; color:#120a26; background:var(--yellow);
    padding:8px 12px; margin:6px 0 12px; animation:pop .4s; box-shadow:0 4px 0 rgba(0,0,0,.4); }
  @keyframes pop{ 0%{transform:scale(.4)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .ov .bestline{ font-size:18px; color:var(--dim); margin-bottom:18px; }
  .ov .bestline b{ color:var(--yellow); font-weight:400; }
  .ov .row{ display:flex; gap:10px; width:100%; max-width:340px; }
  .ov .row .btn{ font-size:11px; padding:15px 8px; }
  .ov .again{ background:var(--green); }
  .ov .menu{ background:var(--panel2); color:var(--ink); }
  .ov .share{ background:var(--pink); color:#fff; margin-top:10px; max-width:340px; }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:120;
    background:var(--cyan); color:#120a26; font-family:var(--disp); font-size:10px;
    padding:11px 16px; box-shadow:0 4px 0 rgba(0,0,0,.5); opacity:0; transition:opacity .2s; }
  .toast.show{ opacity:1; }

  .countbadge{ position:absolute; top:12px; right:14px; font-family:var(--disp); font-size:11px; color:var(--cyan); }
  /* card subtitle */
  .cart .ds{ font-size:14px; color:var(--dim); line-height:1.25; margin-top:5px; min-height:18px; }

  /* game layout with side help */
  .gamewrap{ flex:1; display:flex; min-height:0; }
  .gamewrap .play{ flex:1; }
  aside.help{ width:230px; flex:none; border-left:2px solid var(--line); background:var(--bg2);
    padding:16px 15px; overflow-y:auto; }
  aside.help .ht{ font-family:var(--disp); font-size:9px; color:var(--ac,var(--cyan)); line-height:1.5; margin-bottom:10px;
    border-bottom:1px dashed var(--line); padding-bottom:10px; }
  aside.help .hd{ font-size:18px; line-height:1.5; color:var(--ink); }
  aside.help .hd b{ color:var(--yellow); font-weight:400; }
  aside.help .hk{ font-family:var(--disp); font-size:8px; color:var(--dim); margin:16px 0 6px; }

  /* ready / how-to overlay */
  .ov .howto{ font-size:19px; line-height:1.55; color:var(--ink); max-width:340px; margin:2px 0 18px; }
  .ov .howto b{ color:var(--yellow); font-weight:400; }
  .ov .start{ background:var(--green); max-width:300px; font-size:14px; padding:18px; }
  .ov .ic-big{ font-size:46px; margin-bottom:6px; }

  /* pack 2 surfaces */
  .cv{ display:block; margin:0 auto; border:3px solid var(--line); background:var(--panel); touch-action:none; }
  .picker-stage,.smash-area{ position:relative; width:100%; max-width:440px; height:min(50vh,400px); margin:0 auto;
    background:var(--panel); border:3px solid var(--line); touch-action:none; overflow:hidden; }
  .pdot{ position:absolute; width:54px; height:54px; margin:-27px 0 0 -27px; border-radius:50%;
    box-shadow:0 0 0 3px rgba(255,255,255,.25),0 4px 0 rgba(0,0,0,.4); transition:transform .3s,opacity .3s; }
  .pdot.win{ transform:scale(1.7); box-shadow:0 0 0 5px #fff,0 0 26px 8px currentColor; z-index:3; animation:ppulse .7s infinite alternate; }
  .pdot.lose{ opacity:.16; transform:scale(.65); }
  @keyframes ppulse{ to{ transform:scale(1.95);} }
  .target{ position:absolute; width:70px; height:70px; transform:translate(-50%,-50%); display:flex;
    align-items:center; justify-content:center; font-size:56px; color:var(--red); cursor:pointer; will-change:transform; }
  .zones{ display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:320px; }
  .zbtn{ font-family:var(--disp); font-size:20px; padding:24px 8px; border:none; cursor:pointer;
    color:#fff; background:var(--panel2); box-shadow:0 5px 0 rgba(0,0,0,.45); }
  .zbtn.zc{ grid-column:1 / span 2; }
  .zbtn.save{ background:var(--red) !important; }
  .zbtn:active{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.45); }
  .holes{ display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:310px; }
  .hole{ aspect-ratio:1/1; background:#0e0826; border:3px solid var(--line); border-radius:46% 46% 50% 50%;
    display:flex; align-items:flex-end; justify-content:center; overflow:hidden; cursor:pointer;
    box-shadow:inset 0 -12px 22px rgba(0,0,0,.6); }
  .mole{ font-size:44px; transform:translateY(120%); transition:transform .12s; pointer-events:none; }
  .mole.up{ transform:translateY(6%); }

  @media(max-width:720px){
    .gamewrap{ flex-direction:column; }
    aside.help{ width:auto; order:-1; border-left:none; border-bottom:2px solid var(--line);
      padding:10px 14px; max-height:30vh; }
    aside.help .ht{ margin-bottom:6px; padding-bottom:6px; font-size:8px; }
    aside.help .hd{ font-size:16px; }
    aside.help .hk{ display:none; }
  }
  @media(prefers-reduced-motion:reduce){
    .shake,.ov .nb,.marquee h1,.insert{ animation:none !important; }
  }

  /* ===================== PACK 3 surfaces ===================== */
  /* timing bar */
  .tbar{ position:relative; width:100%; max-width:420px; height:30px; margin-top:8px;
    background:#0c0720; border:3px solid var(--line); overflow:hidden; }
  .tzone{ position:absolute; top:0; bottom:0; background:rgba(61,255,139,.32);
    border-left:2px solid var(--green); border-right:2px solid var(--green); transition:left .12s, width .12s; }
  .tneedle{ position:absolute; top:-3px; bottom:-3px; width:5px; margin-left:-2.5px;
    background:var(--yellow); box-shadow:0 0 8px var(--yellow); }

  /* shell game cups */
  .cups{ position:relative; width:100%; max-width:380px; height:130px; margin:4px auto 0; }
  .cup{ position:absolute; top:18px; transform:translateX(-50%); cursor:pointer; text-align:center; }
  .cup .cupbody{ font-size:58px; display:block; transition:transform .25s;
    filter:drop-shadow(0 4px 0 rgba(0,0,0,.4)); }
  .cup .ballmark{ font-size:30px; display:block; margin-top:-14px; opacity:0; }
  .cup.lift .cupbody{ transform:translateY(-32px); }
  .cup.lift .ballmark{ opacity:1; }
  .cup.pick .cupbody{ animation:cupwait 1.1s ease-in-out infinite; }
  @keyframes cupwait{ 50%{ transform:translateY(-5px); } }

  /* schulte number grid */
  .ngrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:300px; margin-top:4px; }
  .ncell{ aspect-ratio:1/1; font-family:var(--disp); font-size:20px; color:#fff; background:var(--panel2);
    border:2px solid var(--line); cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.45);
    transition:transform .05s, box-shadow .05s; }
  .ncell:active{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.45); }
  .ncell.done{ background:var(--green); color:#120a26; box-shadow:none; opacity:.5; }

  /* memory cards */
  .cards{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; width:100%; max-width:320px; margin-top:4px; }
  .card{ aspect-ratio:3/4; perspective:600px; cursor:pointer; }
  .cinner{ position:relative; width:100%; height:100%; transition:transform .35s; transform-style:preserve-3d; }
  .card.open .cinner,.card.matched .cinner{ transform:rotateY(180deg); }
  .cface{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    backface-visibility:hidden; -webkit-backface-visibility:hidden; border:2px solid var(--line); }
  .cback{ background:var(--panel2); color:var(--cyan); font-family:var(--disp); font-size:16px; }
  .cfront{ background:var(--panel); font-size:30px; transform:rotateY(180deg); }
  .card.matched .cfront{ background:#16602f; border-color:var(--green); }

  /* spot the difference grid */
  .spotgrid{ display:grid; gap:5px; width:100%; max-width:330px; aspect-ratio:1/1; margin:4px auto 0; }
  .stile{ width:100%; height:100%; border-radius:6px; cursor:pointer; box-shadow:inset 0 0 0 1px rgba(0,0,0,.18); }

  /* slot reels */
  .reels{ display:flex; gap:10px; justify-content:center; margin-top:8px; }
  .reel{ width:74px; height:88px; display:flex; align-items:center; justify-content:center; font-size:44px;
    background:#0c0720; border:3px solid var(--line); box-shadow:inset 0 0 14px rgba(0,0,0,.6); }
  .reel.lock{ border-color:var(--yellow); box-shadow:0 0 12px var(--yellow); }
</style>
</head>
<body>
<div id="crt"></div>

<!-- ===================== MENU ===================== -->
<div id="menu" class="screen active">
  <div class="marquee">
    <h1>찌<span class="c">릿</span></h1>
    <div class="tag">동료랑 아이스크림 내기 하자</div>
    <div class="insert">▶ 딴짓 ㄱㄱ ◀</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="foot">
    월루하면서 동료랑 <b style="color:var(--cyan)">최고기록 경쟁</b> — 기록은 이 기기 안에만 저장, 서버도 로그인도 없음.<br>
    한 판 이기면 <b style="color:var(--pink)">결과 복사</b>해서 동료한테 자랑·도발하기 →
  </div>
</div>

<!-- ===================== GAME ===================== -->
<div id="game" class="screen">
  <div class="topbar">
    <button class="iconbtn" id="backBtn">◀ 메뉴</button>
    <div class="gname" id="gName"></div>
    <button class="iconbtn" id="muteBtn" title="소리">♪</button>
  </div>
  <div class="gamewrap">
    <div class="play" id="play"></div>
    <aside class="help" id="help"></aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------- safe storage (works in sandbox + real deploy) ---------- */
const _mem = {};
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v!==null?v:(_mem[k]??null);}catch(e){ return _mem[k]??null; } },
  set(k,v){ try{ localStorage.setItem(k,v);}catch(e){} _mem[k]=v; }
};

/* ---------- chiptune sound ---------- */
const Sound = {
  ctx:null, on: store.get('mute')!=='1',
  init(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
  blip(freq=440,dur=0.08,type='square',vol=0.18){
    if(!this.on) return; this.init(); if(!this.ctx) return;
    const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(this.ctx.destination); o.start(t); o.stop(t+dur);
  },
  good(){ this.blip(660,.06,'square'); setTimeout(()=>this.blip(990,.08,'square'),55); },
  bad(){ this.blip(160,.18,'sawtooth',.22); },
  tick(){ this.blip(880,.03,'square',.1); },
  win(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.blip(f,.1,'square'),i*70)); }
};

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }
function shake(node){ node.classList.remove('shake'); void node.offsetWidth; node.classList.add('shake'); }
function makeCanvas(parent,hfrac){
  const cv=el('canvas','cv'); parent.append(cv);
  const dpr=Math.min(2, window.devicePixelRatio||1);
  const W=Math.max(260, Math.min(440, (parent.clientWidth||360)-4));
  const H=Math.max(260, Math.min(430, Math.round(window.innerHeight*(hfrac||0.5))));
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  return {cv,ctx,W,H};
}
function cpos(e,cv){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }

/* ---------- best record ---------- */
function bestKey(id){ return 'best_'+id; }
function getBest(g){ const v=store.get(bestKey(g.id)); return v===null?null:Number(v); }
function recordBest(g,score){
  const prev=getBest(g);
  let isNew=false;
  if(prev===null){ isNew=true; }
  else if(g.lower ? score<prev : score>prev){ isNew=true; }
  const best = prev===null ? score : (g.lower ? Math.min(prev,score) : Math.max(prev,score));
  if(isNew) store.set(bestKey(g.id), String(score));
  return { best, isNew, prev };
}

/* 9. FREE THROW (drag slingshot) -------------------------------- */
{
  id:'hoops', name:'드래그 자유투', icon:'🏀', ac:'var(--yellow)', lower:false, fmt:v=>v+'골',
  mount(root,api){
    const col=el('div','col'); root.append(col);
    const meta=el('div','meta'); meta.innerHTML='<div><div class="k">TIME</div><div class="v" id="ht">15</div></div><div><div class="k">골</div><div class="v" id="hs" style="color:var(--yellow)">0</div></div>'; col.append(meta);
    const {cv,ctx,W,H}=makeCanvas(col,0.46);
    col.append(el('div','hint','공을 <b>아래로 당겼다 놓아</b> 림에 넣으세요'));
    const anchor={x:W/2,y:H-40}, maxPull=130, power=0.235, grav=0.52, rim=30, hoopY=80;
    let ball={x:anchor.x,y:anchor.y,r:15,vx:0,vy:0,flying:false,scored:false,prevY:anchor.y};
    let dragging=false, score=0, t=0, alive=true, hoopX=W/2;
    const start=performance.now();
    function reset(){ ball.x=anchor.x; ball.y=anchor.y; ball.vx=ball.vy=0; ball.flying=false; ball.scored=false; }
    cv.addEventListener('pointerdown',e=>{ e.preventDefault(); if(!alive||ball.flying)return; const p=cpos(e,cv); if(Math.hypot(p.x-ball.x,p.y-ball.y)<70)dragging=true; });
    cv.addEventListener('pointermove',e=>{ if(!dragging)return; const p=cpos(e,cv); let dx=p.x-anchor.x,dy=p.y-anchor.y; const d=Math.hypot(dx,dy); if(d>maxPull){dx=dx/d*maxPull; dy=dy/d*maxPull;} ball.x=anchor.x+dx; ball.y=anchor.y+dy; });
    cv.addEventListener('pointerup',()=>{ if(!dragging)return; dragging=false; const dx=anchor.x-ball.x,dy=anchor.y-ball.y; if(Math.hypot(dx,dy)<16){reset();return;} ball.vx=dx*power; ball.vy=dy*power; ball.flying=true; Sound.tick(); });
    function frame(){ if(!alive)return; t+=16; hoopX=W/2+Math.sin(t*0.0011)*(W*0.30);
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#241646'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(hoopX-26,hoopY-42,52,28); ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=2; ctx.strokeRect(hoopX-26,hoopY-42,52,28);
      ctx.strokeStyle='#ff6b3d'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(hoopX-rim,hoopY); ctx.lineTo(hoopX+rim,hoopY); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1.5; for(let i=0;i<=4;i++){ const xt=hoopX-rim+2*rim*(i/4); ctx.beginPath(); ctx.moveTo(xt,hoopY); ctx.lineTo(hoopX-rim/2+rim*(i/4),hoopY+20); ctx.stroke(); }
      ctx.strokeStyle='#5a3fa0'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(anchor.x,H); ctx.lineTo(anchor.x,anchor.y); ctx.stroke();
      if(dragging){ ctx.strokeStyle='#ffd23f'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(anchor.x,anchor.y); ctx.lineTo(ball.x,ball.y); ctx.stroke();
        let px=ball.x,py=ball.y,vx=(anchor.x-ball.x)*power,vy=(anchor.y-ball.y)*power; ctx.fillStyle='rgba(255,255,255,.5)';
        for(let i=0;i<28;i++){ px+=vx; py+=vy; vy+=grav; if(i%2===0){ctx.beginPath(); ctx.arc(px,py,2,0,7); ctx.fill();} if(py>H)break; } }
      if(ball.flying){ ball.prevY=ball.y; ball.x+=ball.vx; ball.y+=ball.vy; ball.vy+=grav;
        if(!ball.scored && ball.vy>0 && ball.prevY<=hoopY && ball.y>=hoopY && Math.abs(ball.x-hoopX)<rim*0.66){ ball.scored=true; score++; col.querySelector('#hs').textContent=score; Sound.good(); }
        if(ball.y>H+40||ball.x<-40||ball.x>W+40)reset(); }
      ctx.fillStyle='#ff8c2b'; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,7); ctx.fill();
      ctx.strokeStyle='#7a3a10'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,7); ctx.stroke();
      raf=requestAnimationFrame(frame); }
    function end(){ if(!alive)return; alive=false; clearInterval(timer); cancelAnimationFrame(raf); Sound.win(); api.finish({score,resultText:score+'골',sub: score>=10?'슈팅 머신':score>=6?'좋아요':'다시!',share:score+'골 (15초)'}); }
    const timer=setInterval(()=>{ const left=Math.ceil(15-(performance.now()-start)/1000); col.querySelector('#ht').textContent=Math.max(0,left); if(left<=0)end(); },100);
    api.teardown(()=>{ alive=false; clearInterval(timer); cancelAnimationFrame(raf); });
    let raf=requestAnimationFrame(frame);
  }
},

{

{

  mount(root,api){

    const cx0=W/2, cy0=H*0.46, R=Math.min(W,H)*0.36;
    const rings=[{r:R,p:2,c:'#4d7bff'},{r:R*0.78,p:4,c:'#21e6c1'},{r:R*0.56,p:6,c:'#3dff8b'},{r:R*0.34,p:8,c:'#ffd23f'},{r:R*0.15,p:10,c:'#ff4d5e'}];
    let arrows=10, score=0, alive=true, rx=cx0, ry=cy0, vx=1.5, vy=1.2, dragging=false, marks=[];
    cv.addEventListener('pointerdown',e=>{e.preventDefault(); if(!alive||arrows<=0)return; dragging=true; const p=cpos(e,cv); rx=p.x; ry=p.y;});
    cv.addEventListener('pointermove',e=>{ if(!dragging)return; const p=cpos(e,cv); rx=p.x; ry=p.y; });
    cv.addEventListener('pointerup',()=>{ if(!dragging)return; dragging=false; shoot(); });
    function shoot(){ const w=8, ax=rx+(Math.random()*2-1)*w, ay=ry+(Math.random()*2-1)*w; marks.push({x:ax,y:ay});
      const d=Math.hypot(ax-cx0,ay-cy0); let pt=0; for(let i=0;i<rings.length;i++) if(d<=rings[i].r)pt=rings[i].p;
      score+=pt; arrows--; col.querySelector('#as').textContent=score; col.querySelector('#aa').textContent=arrows;
      if(pt>=8)Sound.good(); else if(pt>0)Sound.tick(); else Sound.bad();

      if(!dragging){ rx+=vx; ry+=vy; const lim=R*0.92; if(rx<cx0-lim||rx>cx0+lim)vx*=-1; if(ry<cy0-lim||ry>cy0+lim)vy*=-1; }
      marks.forEach(m=>{ ctx.fillStyle='#120a26'; ctx.beginPath(); ctx.arc(m.x,m.y,3,0,7); ctx.fill(); });
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(rx,ry,10,0,7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx-14,ry); ctx.lineTo(rx+14,ry); ctx.moveTo(rx,ry-14); ctx.lineTo(rx,ry+14); ctx.stroke();
      raf=requestAnimationFrame(frame); }
    function end(){ if(!alive)return; alive=false; cancelAnimationFrame(raf); Sound.win(); api.finish({score,resultText:score+'점',sub: score>=70?'명궁':score>=45?'좋아요':'다시!',share:score+'점/10발'}); }

{
  id:'juggle', name:'리프팅', icon:'⚽', ac:'var(--cyan)', lower:false, fmt:v=>v+'회',
  mount(root,api){
    const col=el('div','col'); root.append(col);

    let ball={x:W/2,y:H*0.4,vx:0,vy:0,r:18}, score=0, alive=true, raf=0; const grav=0.42;
    cv.addEventListener('pointerdown',e=>{ if(!alive)return; e.preventDefault(); const p=cpos(e,cv);
      if(Math.hypot(p.x-ball.x,p.y-ball.y)<ball.r+36){ ball.vy=-9.6; ball.vx+=(ball.x-p.x)*0.16; ball.vx=Math.max(-7.5,Math.min(7.5,ball.vx)); score++; col.querySelector('#jgs').textContent=score; Sound.tick(); } });
    function frame(){ if(!alive)return; ctx.clearRect(0,0,W,H); ctx.fillStyle='#15233a'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#0c0720'; ctx.fillRect(0,H-6,W,6);
      ball.vy+=grav; ball.x+=ball.vx; ball.y+=ball.vy; ball.vx*=0.996;
      if(ball.x<ball.r){ball.x=ball.r;ball.vx*=-0.7;} if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx*=-0.7;}
      if(ball.y>=H-6-ball.r){ return end(); }
      ctx.font=(ball.r*2)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('⚽',ball.x,ball.y);
      raf=requestAnimationFrame(frame); }

/* 23. JUMP ROPE (timing) ---------------------------------------- */
{
  id:'jump', name:'줄넘기', icon:'🤸', ac:'var(--pink)', lower:false, fmt:v=>v+'회',
  mount(root,api){
    const col=el('div','col'); root.append(col);
    const meta=el('div','meta'); meta.innerHTML='<div><div class="k">넘은 횟수</div><div class="v" id="jps" style="color:var(--pink)">0</div></div>'; col.append(meta);
    const {cv,ctx,W,H}=makeCanvas(col,0.46);
    col.append(el('div','hint','줄이 <b>발 밑</b>에 올 때 탭해서 점프! 갈수록 빨라져요'));
    const cx=W/2, groundY=H*0.72;
    let p=0, period=1700, score=0, alive=true, raf=0, last=0, jumpUntil=0, scored=false;
    cv.addEventListener('pointerdown',e=>{e.preventDefault(); if(!alive)return; jumpUntil=performance.now()+380; Sound.tick();});
    function frame(now){ if(!alive)return; if(!last)last=now; const dt=Math.min(50,now-last); last=now; p+=dt/period; if(p>=1)p-=1;
      const airborne=now<jumpUntil; const hop=airborne? Math.sin((1-(jumpUntil-now)/380)*Math.PI)*54 : 0;
      const yOff=-Math.cos(p*Math.PI*2);
      if(yOff>0.94 && !scored){ scored=true; if(airborne){ score++; col.querySelector('#jps').textContent=score; Sound.good(); period=Math.max(680,period-32); } else { return end(); } }
      if(yOff<0.5) scored=false;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#241646'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#0c0720'; ctx.fillRect(0,groundY+14,W,H-groundY);
      const py=groundY-hop; ctx.font='40px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('🤸',cx,py+6);
      const ropeY = groundY+8 - (1-(yOff+1)/2)*120;
      ctx.strokeStyle = yOff>0.94?'#ff4d5e':'#ffd23f'; ctx.lineWidth=4; ctx.beginPath();
      ctx.moveTo(cx-W*0.4, groundY-50); ctx.quadraticCurveTo(cx, ropeY, cx+W*0.4, groundY-50); ctx.stroke();
      raf=requestAnimationFrame(frame); }
    function end(){ if(!alive)return; alive=false; cancelAnimationFrame(raf); Sound.bad(); shake(cv); api.finish({score,resultText:score+'회',sub: score>=30?'줄넘기 챔피언':score>=15?'좋아요':'다시!',share:score+'회 줄넘기'}); }
    api.teardown(()=>{ alive=false; cancelAnimationFrame(raf); });
    Sound.init(); raf=requestAnimationFrame(frame);
  }
},
/* 24. TIMING SLOT (stop the reels) ------------------------------ */
{
  id:'slot', name:'타이밍 슬롯', icon:'🎰', ac:'var(--yellow)', lower:false, fmt:v=>v+'점',
  mount(root,api){
    const SYM=['🍒','🔔','⭐','7️⃣','🍋'], PTS={'🍒':10,'🔔':15,'⭐':25,'7️⃣':50,'🍋':5};
    const col=el('div','col'); root.append(col);
    const meta=el('div','meta'); meta.innerHTML='<div><div class="k">남은 스핀</div><div class="v" id="sln" style="color:var(--yellow)">8</div></div><div><div class="k">점수</div><div class="v" id="sls" style="color:var(--green)">0</div></div>'; col.append(meta);
    col.append(el('div','hint','릴 3개를 <b>STOP</b>으로 하나씩 멈춰 그림 맞추기! 셋 다 같으면 잭팟'));
    const reelRow=el('div','reels'); const reels=[]; for(let i=0;i<3;i++){ const r=el('div','reel','❔'); reelRow.append(r); reels.push({el:r,idx:0,timer:0}); } col.append(reelRow);
    const btn=el('button','btn','■ STOP (릴 1)'); btn.style.maxWidth='300px'; btn.style.marginTop='18px'; btn.style.background='var(--yellow)'; col.append(btn);
    let spinsLeft=8, score=0, cur=0, alive=true, spinning=false;
    function startSpin(){ if(!alive)return; spinning=true; cur=0; btn.disabled=false; btn.textContent='■ STOP (릴 1)';
      reels.forEach(r=>{ clearInterval(r.timer); r.el.classList.remove('lock'); r.timer=setInterval(()=>{ r.idx=(r.idx+1)%SYM.length; r.el.textContent=SYM[r.idx]; }, 70); }); }
    function stopNext(){ if(!alive||!spinning)return; const r=reels[cur]; clearInterval(r.timer); r.el.textContent=SYM[r.idx]; r.el.classList.add('lock'); Sound.tick(); cur++;
      if(cur<3){ btn.textContent='■ STOP (릴 '+(cur+1)+')'; }
      else { btn.disabled=true; spinning=false; evaluate(); } }
    function evaluate(){ const a=reels[0].idx,b=reels[1].idx,c=reels[2].idx; let gained=0;
      if(a===b&&b===c){ gained=PTS[SYM[a]]*3; Sound.win(); }
      else if(a===b||b===c||a===c){ const m=(a===b)?a:((b===c)?b:a); gained=PTS[SYM[m]]; Sound.good(); }
      else { Sound.bad(); }
      score+=gained; col.querySelector('#sls').textContent=score; spinsLeft--; col.querySelector('#sln').textContent=spinsLeft;
      if(spinsLeft<=0){ alive=false; setTimeout(()=>{ Sound.win(); api.finish({score,resultText:score+'점',sub: score>=200?'잭팟 헌터':score>=100?'좋아요':'운이 안 따랐네',share:score+'점/8스핀'}); },550); }
      else { setTimeout(()=>{ if(alive)startSpin(); },650); }
    }
    btn.addEventListener('pointerdown',e=>{e.preventDefault(); Sound.init(); stopNext();});
    api.teardown(()=>{ alive=false; reels.forEach(r=>clearInterval(r.timer)); });
    Sound.init(); startSpin();
  }
}
];

  let score=0, cur=null, end=performance.now()+cfg.duration, timer=0, btns=[];
  function buildButtons(defs){ grid.innerHTML=''; btns=[];
    defs.forEach(d=>{ const b=el('button','pad',d.label); b.style.background=d.bg; b.style.color=d.ink||'#120a26';
      b.addEventListener('pointerdown',e=>{e.preventDefault(); answer(d.value);}); grid.append(b); btns.push(b); });
  }
  function nextQ(){ cur=cfg.make(); prompt.innerHTML=cur.promptHTML;
    if(cur.buttonsOverride) buildButtons(cur.buttonsOverride);
    else if(!btns.length) buildButtons(cfg.buttons);
  }
  function answer(v){ if(performance.now()>=end)return;
    if(v===cur.answer){ score++; Sound.tick(); }
    else { score=Math.max(0,score-1); Sound.bad(); }
    scoreEl.textContent=score+'점'; nextQ();
  }
  timer=setInterval(()=>{ const left=Math.max(0,(end-performance.now())/1000); timeEl.textContent=left.toFixed(0);
    if(left<=0){ clearInterval(timer); Sound.win(); btns.forEach(b=>b.disabled=true);
      api.finish({score,resultText:score+'점',sub: score>=20?'미친 두뇌':score>=12?'아주 좋아요':'다시!', share:score+'점'}); }
  },100);
  api.teardown(()=>clearInterval(timer));
  Sound.init(); nextQ();
}

/* =====================================================================
   APP SHELL  (menu <-> game)
   ===================================================================== */
const menuScreen=$('#menu'), gameScreen=$('#game'), play=$('#play');
let teardowns=[], activeGame=null;

function runTeardowns(){ teardowns.forEach(fn=>{ try{fn();}catch(e){} }); teardowns=[]; }

/* ---------- sponsor / promo cards (same size as game cards) ---------- */
const PROMOS=[
  { icon:'📸', name:'MAVS.KR 인스타', label:'@mavs.kr 팔로우', ac:'var(--pink)', url:'https://www.instagram.com/mavs.kr' },
  { icon:'🏀', name:'MAVS.KR 홈', label:'mavs.kr 바로가기', ac:'var(--cyan)', url:'https://mavs.kr' }
];

function makePromoCard(p){
  const a=el('a','cart promo'); a.href=p.url; a.target='_blank'; a.rel='noopener noreferrer';
  a.style.setProperty('--ac',p.ac);
  a.innerHTML=`<span class="admark">AD</span>`+
    `<div class="ic">${p.icon}</div><div class="nm">${p.name}</div>`+
    `<div class="ds">${p.label}</div>`+
    `<div class="bs" style="color:var(--cyan)">바로가기 ↗</div>`;
  return a;
}

function buildMenu(){
  const grid=$('#grid'); grid.innerHTML='';
  const k=PROMOS.length;
  // each promo appears exactly once, evenly spread through the grid
  const slots=PROMOS.map((p,idx)=> Math.round(GAMES.length*(idx+1)/(k+1)) );
  GAMES.forEach((g,i)=>{
    const b=getBest(g);
    const card=el('button','cart'); card.style.setProperty('--ac',g.ac);
    card.innerHTML=`<div class="ic">${g.icon}</div><div class="nm">${g.name}</div>`+
      `<div class="ds">${INFO[g.id]?INFO[g.id].ds:''}</div>`+
      (g.noBest?`<div class="bs">🎲 내기용</div>`
        :(b===null?`<span class="no" style="background:${g.ac};color:#120a26">기록없음</span>`
                  :`<div class="bs">최고 <b>${g.fmt(b)}</b></div>`));
    card.addEventListener('click',()=>openGame(g));
    grid.append(card);
    const si=slots.indexOf(i+1);
    if(si!==-1) grid.append(makePromoCard(PROMOS[si]));
  });
}

function openGame(g){
  activeGame=g; Sound.init();
  $('#gName').textContent=g.name; $('#gName').style.setProperty('--ac',g.ac);
  gameScreen.style.setProperty('--ac',g.ac);
  const info=INFO[g.id]||{how:''};
  $('#help').innerHTML=`<div class="ht">${g.icon} ${g.name}</div>`+
    `<div class="hk">게임 방법</div><div class="hd">${info.how}</div>`;
  menuScreen.classList.remove('active'); gameScreen.classList.add('active');
  showReady(g);
}

function showReady(g){
  runTeardowns(); play.innerHTML='';
  const info=INFO[g.id]||{how:''};
  const ov=el('div','ov');
  ov.innerHTML=`<div class="ic-big">${g.icon}</div><div class="res">${g.name}</div>`+
    `<div class="howto">${info.how}</div>`;
  const startBtn=el('button','btn start','▶ START');
  startBtn.addEventListener('click',()=>{ Sound.init(); Sound.good(); start(g); });
  ov.append(startBtn); play.append(ov);
}

function start(g){
  runTeardowns(); play.innerHTML='';
  const api={
    game:g, sound:Sound,
    teardown(fn){ teardowns.push(fn); },
    finish(r){ // r:{score,resultText,sub,share,noRecord}
      runTeardowns();
      let isNew=false, best=getBest(g);
      if(!r.noRecord && r.score!=null){ const rec=recordBest(g,r.score); isNew=rec.isNew; best=rec.best; if(isNew){ buildMenu(); } }
      showResult(g,r,isNew,best);
    }
  };
  g.mount(play,api);
}

function showResult(g,r,isNew,best){
  const ov=el('div','ov');
  ov.innerHTML=`<div class="res">${r.resultText}</div><div class="sub">${r.sub||''}</div>`+
    (isNew?`<div class="nb">★ 신기록! ★</div>`:'')+
    (best!=null?`<div class="bestline">내 최고 <b>${g.fmt(best)}</b></div>`:`<div class="bestline"> </div>`);
  const row=el('div','row');
  const again=el('button','btn again','다시하기');
  const menu=el('button','btn menu','메뉴');
  again.addEventListener('click',()=>{ ov.remove(); Sound.init(); start(g); });
  menu.addEventListener('click',()=>goMenu());
  row.append(again,menu);
  const share=el('button','btn share','🔗 결과 복사해서 도발하기');
  share.addEventListener('click',()=>{
    const txt=`🕹️ ${g.name} — ${r.share||r.resultText}! 이겨봐 → 찌릿`;
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(()=>toast('복사됨! 친구한테 붙여넣기'),()=>toast(txt)); }
    else toast('복사: '+txt);
  });
  ov.append(row,share); play.append(ov);
  if(isNew) Sound.win();
}

function goMenu(){ runTeardowns(); play.innerHTML=''; gameScreen.classList.remove('active'); menuScreen.classList.add('active'); buildMenu(); }

$('#backBtn').addEventListener('click',goMenu);
$('#muteBtn').addEventListener('click',()=>{ Sound.on=!Sound.on; store.set('mute',Sound.on?'0':'1'); $('#muteBtn').textContent=Sound.on?'♪':'✕'; if(Sound.on){Sound.init();Sound.tick();} });
$('#muteBtn').textContent=Sound.on?'♪':'✕';
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&gameScreen.classList.contains('active'))goMenu(); });

buildMenu();
</script>
</body>
